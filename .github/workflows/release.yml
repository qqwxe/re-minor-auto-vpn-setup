name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev
      - name: Build .deb
        run: |
          mkdir -p reminor-pkg/pkg-deb/DEBIAN
          mkdir -p reminor-pkg/pkg-deb/usr/bin
          cp reminor-pkg/src/usr/bin/reminor reminor-pkg/pkg-deb/usr/bin/
          cat > reminor-pkg/pkg-deb/DEBIAN/control << 'EOF'
Package: reminor
Version: 1.0
Section: net
Priority: optional
Architecture: amd64
Depends: bash, curl, wget, jq, qrencode, openssl, uuid-runtime, net-tools, bc, iproute2
Maintainer: re minor <dev@reminor.local>
Description: re minor VPN auto-configurator
 One-click deployment of VLESS+Reality, Trojan, Hysteria2
 and AmneziaWG via sing-box.
EOF
          chmod 755 reminor-pkg/pkg-deb/DEBIAN
          dpkg-deb --build reminor-pkg/pkg-deb reminor_1.0-1_amd64.deb
      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: reminor_1.0-1_amd64.deb

  build-rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install RPM tools
        run: sudo apt-get install -y rpm
      - name: Build .rpm
        run: |
          mkdir -p ~/rpmbuild/SOURCES ~/rpmbuild/RPMS/noarch
          cp reminor-pkg/src/usr/bin/reminor ~/rpmbuild/SOURCES/
          rpmbuild -bb --build-in-place reminor-pkg/reminor.spec || \
            rpmbuild -bb --define "_topdir $HOME/rpmbuild" \
                     --define "_sourcedir $HOME/rpmbuild/SOURCES" \
                     reminor-pkg/reminor.spec
          cp ~/rpmbuild/RPMS/noarch/reminor-*.rpm .
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: reminor-*.rpm

  build-arch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd
      - name: Build .pkg.tar.zst
        run: |
          PKGDIR=$(mktemp -d)
          mkdir -p "$PKGDIR/usr/bin"
          cp reminor-pkg/src/usr/bin/reminor "$PKGDIR/usr/bin/"
          cat > "$PKGDIR/.PKGINFO" << 'EOF'
pkgname = reminor
pkgver = 1.0-1
pkgdesc = re minor VPN auto-configurator
arch = x86_64
license = MIT
url = https://reminor.local
EOF
          cd "$PKGDIR"
          tar cf - .PKGINFO usr | zstd -c > "$OLDPWD/reminor-1.0-1-x86_64.pkg.tar.zst"
      - uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: reminor-1.0-1-x86_64.pkg.tar.zst

  release:
    needs: [build-deb, build-rpm, build-arch]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/deb-package/*.deb
            artifacts/rpm-package/*.rpm
            artifacts/arch-package/*.pkg.tar.zst
            reminor-pkg/PKGBUILD
            reminor-pkg/reminor.spec
            reminor-pkg/install.sh
          generate_release_notes: true
