name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}"             --title "${{ github.ref_name }}"             --generate-notes             reminor-pkg/install.sh             reminor-pkg/PKGBUILD             reminor-pkg/reminor.spec             re_minor.sh || true
